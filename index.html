<!doctype html>
<html lang="ko">
<head>
  <meta property="og:type" content="website">
  <meta property="og:title" content="월광보합 게임검색엔진">
  <meta property="og:url" content="https://game.gslump.com">
  <link rel="canonical" href="https://game.gslump.com">
  <meta name="description" content="월광보합 시리즈 게임검색엔진">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <title>월광보합 게임검색엔진</title>
  <style>
  body { padding-top: 1rem; padding-bottom: 1rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex align-items-center mb-2">
    <h4 class="mb-0"><a id="title-link" href="#">월광보합</a> <small>게임검색엔진</small></h4>
    <a href="https://github.com/sng2c/retro-game-search" target="_blank" rel="noopener" class="ml-auto text-dark" title="GitHub">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24" height="24" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </div>
  <form id="search-form">
    <div class="form-group row">
      <div class="col-sm-12">
        <select id="model-select" class="form-control">
          <option value="">모델선택</option>
        </select>
      </div>
    </div>
    <div class="form-group row">
      <div class="col-sm-12">
        <div class="input-group">
          <input id="query-input" class="form-control" type="text" placeholder="">
          <div class="input-group-append">
            <button class="btn btn-outline-secondary" type="submit">검색</button>
          </div>
        </div>
      </div>
    </div>
  </form>
  <ul id="game-list" class="list-group"></ul>
</div>

<script src="games.js"></script>
<script>
const modelSelect = document.getElementById('model-select');

// MODELS(games.js)로 select 옵션 동적 생성
Object.entries(MODELS).forEach(([code, label]) => {
  const opt = document.createElement('option');
  opt.value = code;
  opt.textContent = label;
  modelSelect.appendChild(opt);
});


const queryInput  = document.getElementById('query-input');
const gameList    = document.getElementById('game-list');
const titleLink   = document.getElementById('title-link');

function getParams() {
  const p = new URLSearchParams(location.search);
  return { model: p.get('model') || '', q: p.get('q') || '' };
}

function setParams(model, q) {
  const p = new URLSearchParams();
  if (model) p.set('model', model);
  if (q)     p.set('q', q);
  const qs = p.toString();
  history.pushState({}, '', qs ? '?' + qs : location.pathname);
}

function renderList(games) {
  gameList.innerHTML = games.map(g => {
    const badge = `<span class="badge badge-pill badge-dark">${g.id}</span>`;
    let title;
    if (g.title && g.title_ko) {
      title = `<span class="title">${g.title_ko}</span> <span class="title"><small> - ${g.title}</small></span>`;
    } else {
      title = `<span class="title">${g.title_ko || g.title}</span>`;
    }
    return `<li class="list-group-item">${badge} ${title}</li>`;
  }).join('');
}

const CHOSUNG  = 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
const JUNGSUNG = 'ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ';
const JONGSUNG = ' ㄱㄲㄳㄴㄵㄶㄷㄹㄺㄻㄼㄽㄾㄿㅀㅁㅂㅄㅅㅆㅇㅈㅊㅋㅌㅍㅎ';

function decomposeKo(text) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code < 0xAC00 || code > 0xD7A3) return ch;
    const offset = code - 0xAC00;
    const cho  = Math.floor(offset / (21 * 28));
    const jung = Math.floor((offset % (21 * 28)) / 28);
    const jong = offset % 28;
    return CHOSUNG[cho] + JUNGSUNG[jung] + (jong ? JONGSUNG[jong] : '');
  }).join('');
}

function filterAndRender(model, q) {
  const games = (GAMES[model] || []);
  if (!games.length) { gameList.innerHTML = ''; return; }
  const kw = q.trim();
  const result = kw
    ? (() => {
        const kwJamo = decomposeKo(kw).replace(/ /g, '');
        const kwEn = kw.toLowerCase().replace(/ /g, '');
        const isChosung = /^[ㄱ-ㅎ]+$/.test(kwJamo);
        return games.filter(g =>
          (g.title   && g.title.toLowerCase().replace(/ /g, '').includes(kwEn)) ||
          (g.jamo    && g.jamo.includes(kwJamo)) ||
          (isChosung && g.chosung && g.chosung.includes(kwJamo))
        );
      })()
    : games;
  renderList(result);
}

function updateTitle(model, q) {
  const modelTitle = MODELS[model] || '월광보합';
  const base = model ? modelTitle : '월광보합';
  document.title = q ? `${base} - '${q}' 검색결과` : `${base} 게임검색엔진`;
  titleLink.href = model ? `?model=${encodeURIComponent(model)}` : '?';
  titleLink.textContent = base;
}

function applyState() {
  const { model, q } = getParams();
  modelSelect.value = model;
  queryInput.value  = q;
  updateTitle(model, q);
  filterAndRender(model, q);
}

// 모델 변경 시 즉시 submit
modelSelect.addEventListener('change', () => {
  setParams(modelSelect.value, queryInput.value);
  applyState();
});

document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  setParams(modelSelect.value, queryInput.value);
  applyState();
});

queryInput.addEventListener('input', () => {
  filterAndRender(modelSelect.value, queryInput.value);
});

window.addEventListener('popstate', applyState);

applyState();
</script>
</body>
</html>
